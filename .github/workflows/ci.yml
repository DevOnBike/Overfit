name: CI / Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Use a matrix to avoid duplicating the job for Linux and Windows
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    # NuGet package cache (speeds up restore)
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install linux components (OpenMP)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update -y && sudo apt-get install -y libomp-dev

    - name: Security Audit (Vulnerable Packages)
      run: dotnet list package --vulnerable --include-transitive

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Test (Windows)
      if: matrix.os == 'windows-latest'
      run: dotnet test -c Release --no-build --verbosity normal

    - name: Test with Coverage (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: dotnet test ./Tests/Tests.csproj -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    # Generate and upload reports (Linux only, to avoid doing it twice)
    - name: Install ReportGenerator
      if: matrix.os == 'ubuntu-latest'
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      if: matrix.os == 'ubuntu-latest'
      run: reportgenerator -reports:./coverage/*/coverage.cobertura.xml -targetdir:./coverage/report -reporttypes:Html

    - name: Upload coverage artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: ./coverage/report

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/*/coverage.cobertura.xml
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }} # Required in V4!

  # NATIVE AOT GUARD: compiles the main library under AOT.
  # If someone adds LINQ or Reflection, this step breaks the build immediately.
  aot-guard:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x
    - name: Verify Native AOT Compilation
      run: dotnet publish ./Sources/Main/Main.csproj -c Release -r linux-x64 --self-contained true