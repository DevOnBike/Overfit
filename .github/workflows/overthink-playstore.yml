# Build OverThink as a signed AAB and publish it to Google Play — MANUALLY triggered only (you control
# when it runs, exactly like the nuget.org workflow). Never fires on a push/tag.
#
# Run it from: Actions → "google play" → Run workflow (pick the track; optionally pin a version).
# The very FIRST upload of an app usually has to be done by hand in the Play Console (create the app +
# first release); after that this publishes updates to the chosen track.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of your upload keystore  (base64 -w0 upload.keystore)
#   ANDROID_KEYSTORE_PASSWORD  the keystore (store) password
#   ANDROID_KEY_ALIAS          the key alias (e.g. overthink)
#   ANDROID_KEY_PASSWORD       the key password
#   PLAY_SERVICE_ACCOUNT_JSON  the Play Console service-account JSON (API access → grant release rights)

name: google play

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'versionName to publish (e.g. 10.0.28). Leave empty to use <Version> from Directory.Build.props'
        required: false
      track:
        description: 'Play track to release to'
        required: true
        default: internal
        type: choice
        options: [ internal, alpha, beta, production ]

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PROJECT: Demo/OverfitChatApp/OverfitChatApp.csproj
      PACKAGE: com.devonbike.overthink
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install the Android workload
        run: dotnet workload install android

      # Fetch the bundled model into Assets at build time (it's git-ignored — over GitHub's 100 MB limit).
      - name: Fetch bundled model
        run: |
          curl -L -f --retry 3 -o Demo/OverfitChatApp/Assets/smollm2-135m.gguf \
            https://huggingface.co/bartowski/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q4_K_M.gguf

      - name: Decode upload keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.keystore"

      - name: Publish signed AAB
        run: |
          VERSION_ARG=""
          if [ -n "${{ inputs.version }}" ]; then
            VERSION_ARG="-p:Version=${{ inputs.version }}"
            echo "Publishing versionName ${{ inputs.version }}"
          else
            echo "Publishing versionName from Directory.Build.props <Version>"
          fi

          dotnet publish "$PROJECT" -c Release -f net10.0-android \
            -p:AndroidPackageFormat=aab \
            -p:RunAOTCompilation=true \
            -p:AcceptAndroidSdkLicenses=true \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$RUNNER_TEMP/upload.keystore" \
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            $VERSION_ARG

      - name: Locate the AAB
        id: aab
        run: |
          path="$(find Demo/OverfitChatApp/bin/Release/net10.0-android -name '*-Signed.aab' | head -1)"
          echo "Found: $path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.devonbike.overthink
          releaseFiles: ${{ steps.aab.outputs.path }}
          track: ${{ inputs.track }}
          status: completed
